# Log4j2 config for SaltRim. The only log4j user is Apache POI (xlsx export);
# this just gives it a backend so it stops printing the "could not find a logging
# implementation" bootstrap warning, and keeps it quiet (root = warn) on STDERR.
# SaltRim's own logging goes through uno.michelada.saltrim.util/log (stdout).
status = error
name = saltrim

appender.console.type = Console
appender.console.name = STDERR
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5level %logger{1} - %msg%n

rootLogger.level = warn
rootLogger.appenderRef.stderr.ref = STDERR
